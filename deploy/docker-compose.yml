# Aspira Pay V2 — Docker Compose Deployment
# Architecture doc §16.1: Minimal deployment for Sandbox

version: "3.8"

services:
  # ──────────────────────────────────────────────────────
  # PostgreSQL — Core business database
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aspirapay
      POSTGRES_USER: aspirapay
      POSTGRES_PASSWORD: aspirapay_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    networks:
      - aspira_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aspirapay -d aspirapay"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────
  # Redis — Cache & rate limiting
  # ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - aspira_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────
  # NATS — Event-driven message queue (JetStream)
  # ──────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    networks:
      - aspira_net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────
  # C++ Trading & Clearing Engine
  # ──────────────────────────────────────────────────────
  engine:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.engine
    ports:
      - "9090:9090"
    volumes:
      - engine_data:/data
    networks:
      - aspira_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENGINE_WAL_PATH=/data/engine.wal

  # ──────────────────────────────────────────────────────
  # Go API Server (monolith)
  # ──────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=aspirapay
      - DB_PASSWORD=aspirapay_secret
      - DB_NAME=aspirapay
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - ENGINE_ADDR=engine:9090
      - JWT_SECRET=change-me-in-production-use-a-strong-secret
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - aspira_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────
  # Web Admin Dashboard
  # ──────────────────────────────────────────────────────
  web-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - aspira_net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────
  # Prometheus — Metrics collection
  # ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - aspira_net
    restart: unless-stopped

  # ──────────────────────────────────────────────────────
  # Grafana — Monitoring dashboards
  # ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - aspira_net
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  pgdata:
  engine_data:
  prometheus_data:
  grafana_data:

networks:
  aspira_net:
    driver: bridge
