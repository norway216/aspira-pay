# Aspira Pay V2 — Prometheus Scrape Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'aspira-api'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'

  - job_name: 'aspira-engine'
    scrape_interval: 5s
    static_configs:
      - targets: ['engine:9090']

  - job_name: 'nats'
    scrape_interval: 10s
    static_configs:
      - targets: ['nats:8222']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
